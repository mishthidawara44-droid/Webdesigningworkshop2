<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/react@18/und/react.development.js"></script>
   <script src="https://unpkg.com/react-don@18/und/react-dom,development.js"></script>
   <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body> 
    <div id="root"></div>
    <script type="text/babel">
        function welcome(props){
            return <h1>Hello {props.name}</h1>;
        }
        function app(){
            return(
                <div>
                    <welcome name="Rahul"/>
                    <welcome name="Anita"/>
                    <welcome name="Rohan"/>
                </div>
            );
        }
        const root=ReactDOM.createRoot(document.getElementById("root"));
        root.render(<app/>);


    </script>
    
</body>
</html>
